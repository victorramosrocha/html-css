<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.container {
            background-color: salmon;
            display: flex;

            flex-flow: row wrap-reverse;
        }
        div.item {
            background-color: lightblue;
            border: 1px solid lightgray ;
            text-align: center;
            padding: 10px;
            
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">BLOCO DE TESTE A</div>
        <div class="item">BLOCO DE TESTE B</div>
        <div class="item">BLOCO DE TESTE C</div>
        <div class="item">BLOCO DE TESTE D</div>
        <div class="item">BLOCO DE TESTE E</div>
        <div class="item">BLOCO DE TESTE F</div>
        <div class="item">BLOCO DE TESTE G</div>
    </div>
</body>
</html>
