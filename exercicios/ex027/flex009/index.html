<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        div.container {
            background-color: salmon;
            display: flex;
            flex-flow: row wrap;
        }
        div.item {
            background-color: lightblue;
            border: 1px solid lightgray ;
            text-align: center;

            flex-basis: 150px; /* por padrão é auto */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B - outro conteúdo</div>
        <div class="item">C</div>
        <div class="item">D - conteúdo um pouco maior</div>
        <div class="item">E</div>
        <div class="item">F - conteúdo maior ainda que vai ocupar mais espaço</div>
        <div class="item">G</div>
    </div>
</body>
</html>
